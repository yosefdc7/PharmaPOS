# .github/workflows/build.yml
name: Build

on: push

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js, NPM and Yarn
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Install Linux packaging dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm

      - name: Install Linux Forge maker backends
        if: matrix.os == 'ubuntu-latest'
        run: |
          npm install --save-dev --package-lock=false electron-installer-debian@^3.2.0 electron-installer-redhat@^3.4.0
          node -e "console.log(require.resolve('electron-installer-debian')); console.log(require.resolve('electron-installer-redhat'));"
          

      - name: Build installers
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO: false
        run: npm run make

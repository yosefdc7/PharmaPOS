name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-prototype
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: web-prototype/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run quality gates
        run: npm run ci:gates

      - name: Build web prototype
        run: npm run build

      - name: Release placeholder
        run: echo "Tag created. Connect this workflow to your deployment provider for production release."
